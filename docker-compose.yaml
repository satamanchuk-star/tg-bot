services:
  bot:
    image: satamanchuk/alexbot:latest
    container_name: alexbot
    restart: unless-stopped
    # Даём боту время на корректное завершение (закрытие сессии/планировщика).
    stop_grace_period: 30s
    volumes:
      - ./data:/app/data
    # ВСЕ переменные (секреты + настройки) приходят из .env.
    # На сервере .env пишет деплой-пайплайн из GitHub Secrets (BOT_ENV).
    # В git .env не хранится (см. .gitignore) — секреты живут только в секретах.
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
