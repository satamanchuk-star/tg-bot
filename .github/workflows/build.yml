name: Build and Deploy

on:
  push:
    branches:
      - main
  # Позволяет запускать деплой вручную (в т.ч. из Claude через GitHub API).
  workflow_dispatch:

jobs:
  # Тесты ПЕРЕД сборкой: прямой push в main (в т.ч. правка через веб-интерфейс)
  # раньше уезжал в прод непроверенным — quality-gate гонялся только на PR.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full test suite
        run: |
          pytest -q tests/ infra_catalog/tests/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push with retry
        env:
          BUILD_VERSION: "#${{ github.run_number }} (${{ steps.sha.outputs.short }})"
        run: |
          set -euo pipefail

          for attempt in 1 2; do
            echo "Build attempt ${attempt}/2"

            if docker buildx build \
              --file Dockerfile \
              --platform linux/amd64 \
              --tag satamanchuk/alexbot:latest \
              --push \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --build-arg "BUILD_VERSION=${BUILD_VERSION}" \
              .; then
              echo "Build and push succeeded on attempt ${attempt}."
              exit 0
            fi

            if [ "${attempt}" -eq 1 ]; then
              echo "First attempt failed due to a transient error, retrying in 15 seconds..."
              sleep 15
            fi
          done

          echo "Build and push failed after 2 attempts."
          exit 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Деплой только если заданы серверные секреты (иначе шаг просто пропускается).
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      # Готовим .env из единственного секрета BOT_ENV (всё содержимое env-файла).
      # Секрет маскируется в логах GitHub; на диск раннера попадает эфемерно.
      - name: Render .env from secret
        env:
          BOT_ENV: ${{ secrets.BOT_ENV }}
        run: |
          set -euo pipefail
          if [ -z "${BOT_ENV}" ]; then
            echo "::error::Секрет BOT_ENV не задан — нечего деплоить."
            exit 1
          fi
          printf '%s\n' "${BOT_ENV}" > .env
          # 644, чтобы scp-action (пакует файлы в своём контейнере под другим uid)
          # смог прочитать файл. Строгие права 600 ставятся на сервере при деплое.
          chmod 644 .env

      # Копируем docker-compose.yaml и .env на сервер.
      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml,.env"
          target: /opt/alexbot

      # Тянем свежий образ и перезапускаем.
      - name: Pull image and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/alexbot
            chmod 600 .env
            mkdir -p data
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
